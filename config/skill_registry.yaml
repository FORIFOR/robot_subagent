  object_required: true
  color_required: false
  vla_template: Grab the cube
  vla_template_with_color: Grab the {color} cube
  allowed_objects:
  - cube
  allowed_colors:
  - red
  - blue
  - green
  - black
  - white
  examples:
  - user: キューブをつかんで
    vla_instruction: Grab the cube
  - user: 赤いキューブをつかんで
